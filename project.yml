name: IslandLink

options:
  bundleIdPrefix: com.youmind
  deploymentTarget:
    iOS: "18.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: zh-Hans
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

configs:
  Debug: debug
  Release: release

targets:
  IslandLink:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: "18.0"
      macOS: "14.0"
    sources:
      - path: IslandLink
        type: group
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youmind.islandlink
        PRODUCT_NAME: IslandLink
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator macosx"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "A6M9K8K4QW"
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    info:
      path: IslandLink/Info.plist
      properties:
        CFBundleName: "屿连"
        CFBundleDisplayName: "屿连"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        NSContactsUsageDescription: "屿连使用通讯录来帮你快速导入联系人。"
        NSCalendarsUsageDescription: "屿连使用日历来显示事件提醒。"
        NSFaceIDUsageDescription: "屿连使用面容 ID 来保护你的律师数据。"
        CKSharingSupported: true
        UIBackgroundModes:
          - remote-notification

  IslandLinkWidget:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: "18.0"
    extensionType: widgetkit-extension
    sources:
      - path: IslandLinkWidget
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youmind.islandlink.widget
        DEVELOPMENT_TEAM: "A6M9K8K4QW"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
    info:
      path: IslandLinkWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        WKAppBundleIdentifier: com.youmind.islandlink

schemes:
  IslandLink:
    build:
      targets:
        IslandLink: all
    run:
      config: Debug
    archive:
      config: Release
