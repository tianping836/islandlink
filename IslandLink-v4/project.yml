name: IslandLink

options:
  bundleIdPrefix: com.youmind
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: zh-Hans
  generateEmptyDirectories: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "A6M9K8K4QW"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: true

targets:
  IslandLink:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: 屿连
        excludes:
          - TodayWidget.swift
          - IslandLinkWidget.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youmind.islandlink
        PRODUCT_NAME: IslandLink
        INFOPLIST_KEY_CFBundleDisplayName: 屿连
        INFOPLIST_KEY_UILaunchScreen: {}
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_NSContactsUsageDescription: 屿连使用通讯录来帮你快速导入联系人。
        INFOPLIST_KEY_NSFaceIDUsageDescription: 屿连使用面容 ID 来保护你的本地数据。
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
